<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>權限管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="/js/admin-permissions.js"></script>
</head>

<body class="bg-slate-100 min-h-screen p-6">
  <div class="max-w-6xl mx-auto" x-data="permissionPage()" x-init="init()">
    
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-slate-900">系統權限與 LDAP 映射配置</h1>
      <p class="text-sm text-slate-500 mt-1">管理 LDAP 群組對應角色，以及各單位可查看的地區範圍。</p>
    </div>

    <template x-if="message">
      <div class="mb-4 rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700" x-text="message"></div>
    </template>

    <template x-if="error">
      <div class="mb-4 rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700" x-text="error"></div>
    </template>

    <section class="mb-6 bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
      <h2 class="text-lg font-semibold text-slate-900 border-b border-slate-200 pb-3 mb-4">
        新增 / 更新 LDAP 群組對應角色
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-slate-700 mb-1">LDAP Group DN</label>
          <input
            x-model="form.ldap_group_dn"
            type="text"
            placeholder="例如：CN=YB_Admin,OU=Groups,DC=youbike,DC=com"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm outline-none focus:ring-4 focus:ring-slate-200 focus:border-slate-400"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">系統角色</label>
          <select
            x-model="form.role_id"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm outline-none focus:ring-4 focus:ring-slate-200 focus:border-slate-400"
          >
            <option value="VIEWER">VIEWER</option>
            <option value="REGIONAL_MGR">REGIONAL_MGR</option>
            <option value="ADMIN">ADMIN</option>
          </select>
        </div>
      </div>

      <div class="mt-4">
        <button
          @click="saveRoleMapping"
          :disabled="saving"
          class="rounded-xl bg-slate-900 text-white px-5 py-3 text-sm font-medium hover:bg-slate-800 disabled:opacity-60 disabled:cursor-not-allowed"
        >
          <span x-show="!saving">儲存映射</span>
          <span x-show="saving">儲存中...</span>
          確定
        </button>
      </div>
    </section>

    <section class="mb-6 bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
      <div class="flex items-center justify-between border-b border-slate-200 pb-3 mb-4">
        <h2 class="text-lg font-semibold text-slate-900">LDAP 群組對應角色列表</h2>
        <span class="text-sm text-slate-400" x-text="loading ? '載入中...' : `共 ${configs.roleMappings.length} 筆`"></span>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left text-sm">
          <thead>
            <tr class="text-slate-500">
              <th class="py-3 pr-4 font-medium">LDAP Group DN</th>
              <th class="py-3 pr-4 font-medium">系統角色</th>
              <th class="py-3 font-medium w-32">操作</th>
            </tr>
          </thead>
          <tbody>
            <template x-if="!loading && configs.roleMappings.length === 0">
              <tr>
                <td colspan="3" class="py-8 text-center text-slate-400">目前尚無角色映射資料</td>
              </tr>
            </template>

            <template x-for="item in configs.roleMappings" :key="item.ldap_group_dn">
              <tr class="border-t border-slate-100">
                <td class="py-4 pr-4">
                  <div class="font-mono text-xs text-slate-700 break-all" x-text="item.ldap_group_dn"></div>
                </td>
                <td class="py-4 pr-4">
                  <span
                    class="inline-flex rounded-full px-3 py-1 text-xs font-medium"
                    :class="{
                      'bg-rose-100 text-rose-700': item.role_id === 'ADMIN',
                      'bg-amber-100 text-amber-700': item.role_id === 'REGIONAL_MGR',
                      'bg-slate-100 text-slate-700': item.role_id === 'VIEWER'
                    }"
                    x-text="item.role_id"
                  ></span>
                </td>
                <td class="py-4">
                  <button
                    @click="removeRoleMapping(item.ldap_group_dn)"
                    class="text-sm text-rose-600 hover:text-rose-700"
                  >
                    移除
                  </button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </section>

    <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
      <div class="flex items-center justify-between border-b border-slate-200 pb-3 mb-4">
        <h2 class="text-lg font-semibold text-slate-900">單位與資料範圍（Scope）</h2>
        <span class="text-sm text-slate-400" x-text="`共 ${configs.unitConfigs.length} 個單位設定`"></span>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        <template x-if="configs.unitConfigs.length === 0">
          <div class="col-span-full text-center text-slate-400 py-8">
            目前尚無單位範圍設定
          </div>
        </template>

        <template x-for="unit in configs.unitConfigs" :key="unit.unit_name">
          <div class="rounded-2xl border border-slate-200 p-5">
            <div class="flex items-start justify-between gap-3">
              <div>
                <h3 class="text-base font-semibold text-slate-900" x-text="unit.unit_name"></h3>
                <p class="text-xs text-slate-400 mt-1">
                  關鍵字：
                  <span class="font-mono text-slate-600" x-text="unit.keyword"></span>
                </p>
              </div>
            </div>

            <div class="mt-4">
              <p class="text-xs font-medium text-slate-500 mb-2">可查看地區</p>
              <div class="flex flex-wrap gap-2">
                <template x-if="!unit.regions || unit.regions.length === 0">
                  <span class="text-xs text-slate-400">無設定地區</span>
                </template>

                <template x-for="region in unit.regions" :key="region">
                  <span class="rounded-full bg-slate-100 px-3 py-1 text-xs text-slate-700" x-text="region"></span>
                </template>
              </div>
            </div>
          </div>
        </template>
      </div>
    </section>

  </div>
</body>
</html>
